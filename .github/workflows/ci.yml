name: ci

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24', '26']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Rebuild native binding for current Node ABI
        run: npm run rebuild

      - name: Run full test suite (smoke + regression + integration + sse-contract)
        run: npm test
